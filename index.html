<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打磚塊遊戲</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI',sans-serif}
.game-wrapper{text-align:center}
canvas{background:#16213e;border:2px solid #e94560;border-radius:8px;box-shadow:0 0 30px rgba(233,69,96,0.3);display:block}
.status{color:#fff;font-size:22px;margin-bottom:12px}
.status span{color:#e94560;font-weight:bold}
.hint{color:#888;margin-top:12px;font-size:14px}
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="status">得分 <span id="score">0</span> ｜ 生命 <span id="lives">3</span></div>
  <canvas id="c" width="600" height="400"></canvas>
  <div class="hint">← → 移動 ｜ 空白鍵發球 ｜ R 重來</div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = 600, H = 400;

let score = 0, lives = 3, running = false;
let paddle = { x: 260, y: 370, w: 80, h: 12 };
let ball = { x: 300, y: 358, r: 6, dx: 3, dy: -3 };
let bricks = [];
let particles = [];
let shake = 0;
let combo = 0;
let keys = {};

// Audio
const ac = new (window.AudioContext || window.webkitAudioContext)();

function tone(f, d, t, v) {
  if (ac.state === 'suspended') ac.resume();
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = t || 'square';
  g.gain.setValueAtTime(v || 0.08, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + d);
  o.connect(g);
  g.connect(ac.destination);
  o.start();
  o.stop(ac.currentTime + d);
}

function sfx(type) {
  switch(type) {
    case 'paddle': tone(440, 0.08, 'square', 0.06); break;
    case 'wall': tone(300, 0.05, 'triangle', 0.04); break;
    case 'brick': tone(520 + combo * 40, 0.12, 'square', 0.07); break;
    case 'lose': tone(200, 0.3, 'sawtooth', 0.08); setTimeout(() => tone(150, 0.4, 'sawtooth', 0.06), 150); break;
    case 'over': tone(400,0.2,'sawtooth',0.1);setTimeout(()=>tone(300,0.2,'sawtooth',0.08),200);setTimeout(()=>tone(200,0.4,'sawtooth',0.06),400); break;
    case 'clear': [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,0.15,'square',0.07),i*100)); break;
  }
}

// Particles
function spawn(x, y, color, n) {
  for (let i = 0; i < (n || 10); i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 3;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, decay: 0.015 + Math.random()*0.02, size: 2+Math.random()*4, color });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// Rounded rect helper
function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// Bricks
function initBricks() {
  bricks = [];
  const cols = 8, rows = 5;
  const bw = 65, bh = 20, pad = 8;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      bricks.push({
        x: c * (bw + pad) + pad,
        y: r * (bh + pad) + 35,
        w: bw, h: bh,
        alive: true,
        color: `hsl(${(r/rows)*360}, 80%, 60%)`
      });
    }
  }
}

function reset() {
  paddle.x = 260;
  ball.x = paddle.x + 40;
  ball.y = paddle.y - 6;
  ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
  ball.dy = -3;
  running = false;
  combo = 0;
}

function draw() {
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);
    shake *= 0.85;
    if (shake < 0.3) shake = 0;
  }
  ctx.clearRect(0, 0, W, H);

  // Bricks
  for (const b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    rRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    rRect(b.x+3, b.y+3, b.w-6, 5, 2);
    ctx.fill();
  }

  // Ball glow
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddle glow
  ctx.shadowColor = '#e94560';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#e94560';
  rRect(paddle.x, paddle.y, paddle.w, paddle.h, 6);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  rRect(paddle.x+5, paddle.y+3, paddle.w-10, 4, 2);
  ctx.fill();

  ctx.restore();

  // Particles (unaffected by shake)
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function update() {
  // Paddle movement
  if (keys['ArrowLeft'] && paddle.x > 0) paddle.x -= 5;
  if (keys['ArrowRight'] && paddle.x + paddle.w < W) paddle.x += 5;

  updateParticles();

  if (!running) {
    ball.x = paddle.x + 40;
    ball.y = paddle.y - 6;
    return;
  }

  ball.x += ball.dx;
  ball.y += ball.dy;

  // Wall bounce
  if (ball.x - ball.r < 0 || ball.x + ball.r > W) {
    ball.dx = -ball.dx;
    sfx('wall');
  }
  if (ball.y - ball.r < 0) {
    ball.dy = -ball.dy;
    sfx('wall');
  }

  // Paddle bounce
  if (ball.y + ball.r > paddle.y && ball.y + ball.r < paddle.y + paddle.h + 4 &&
      ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
    const hit = (ball.x - paddle.x) / paddle.w;
    const angle = (hit - 0.5) * Math.PI * 0.7;
    const speed = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy) + 0.1;
    ball.dx = speed * Math.sin(angle);
    ball.dy = -speed * Math.cos(angle);
    sfx('paddle');
    shake = 3;
    combo = 0;
    spawn(ball.x, paddle.y, '#e94560', 5);
  }

  // Ball fall
  if (ball.y + ball.r > H) {
    lives--;
    document.getElementById('lives').textContent = lives;
    sfx('lose');
    shake = 8;
    combo = 0;
    if (lives > 0) {
      running = false;
    } else {
      sfx('over');
      running = false;
      setTimeout(() => {
        alert('遊戲結束！得分：' + score);
        initBricks();
        score = 0;
        lives = 3;
        combo = 0;
        particles = [];
        document.getElementById('score').textContent = '0';
        document.getElementById('lives').textContent = '3';
        reset();
      }, 300);
    }
    return;
  }

  // Brick collision
  for (const b of bricks) {
    if (!b.alive) continue;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      combo++;
      score += 10 * combo;
      document.getElementById('score').textContent = score;
      sfx('brick');
      shake = 4;
      spawn(b.x + b.w/2, b.y + b.h/2, b.color, 15);
      const ox = Math.min(ball.x + ball.r - b.x, b.x + b.w - ball.x + ball.r);
      const oy = Math.min(ball.y + ball.r - b.y, b.y + b.h - ball.y + ball.r);
      if (ox < oy) ball.dx = -ball.dx;
      else ball.dy = -ball.dy;
      if (bricks.every(bx => !bx.alive)) {
        sfx('clear');
        setTimeout(() => {
          alert('恭喜過關！得分：' + score);
          initBricks();
        }, 300);
      }
      break;
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Events
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (!running && lives > 0) {
      running = true;
      const spd = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
      const ang = (Math.random() - 0.5) * 0.8;
      ball.dx = spd * Math.sin(ang) || 2;
      ball.dy = -spd * Math.cos(ang);
    }
  }
  if (e.key === 'r' || e.key === 'R') {
    initBricks();
    score = 0;
    lives = 3;
    combo = 0;
    particles = [];
    document.getElementById('score').textContent = '0';
    document.getElementById('lives').textContent = '3';
    reset();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

initBricks();
reset();
loop();
</script>
</body>
</html>
