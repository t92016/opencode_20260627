<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打磚塊遊戲</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
.game-wrapper { text-align: center; }
canvas { background: #16213e; border: 2px solid #e94560; border-radius: 8px; box-shadow: 0 0 30px rgba(233,69,96,0.3); }
.score { color: #fff; font-size: 24px; margin-bottom: 15px; }
.score span { color: #e94560; font-weight: bold; }
.controls { color: #aaa; margin-top: 15px; font-size: 14px; }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="score">得分：<span id="score">0</span></div>
  <canvas id="game" width="600" height="400"></canvas>
  <div class="controls">← → 移動 ｜ R 重新開始</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const W = 600, H = 400;
const paddleW = 80, paddleH = 12;
const ballR = 6;
const brickRows = 5, brickCols = 8;
const brickW = 65, brickH = 20, brickPad = 8, brickTop = 35;

let score = 0, lives = 3, running = false, animId = null;
let paddle = { x: W/2 - paddleW/2, y: H - 30, w: paddleW };
let ball = { x: W/2, y: H - 40, r: ballR, dx: 3, dy: -3 };
let bricks = [];
let keys = { left: false, right: false };

function initBricks() {
  bricks = [];
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < brickCols; c++) {
      bricks.push({
        x: c * (brickW + brickPad) + brickPad,
        y: r * (brickH + brickPad) + brickTop,
        w: brickW, h: brickH,
        alive: true,
        color: `hsl(${(r/brickRows)*360}, 80%, 60%)`
      });
    }
  }
}

function resetBall() {
  ball.x = paddle.x + paddle.w / 2;
  ball.y = paddle.y - ballR;
  ball.dx = (Math.random() > 0.5 ? 1 : -1) * 3;
  ball.dy = -3;
  running = false;
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddleH, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
  ctx.fill();
  for (let b of bricks) {
    if (!b.alive) continue;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
  }
}

function update() {
  if (keys.left && paddle.x > 0) paddle.x -= 5;
  if (keys.right && paddle.x + paddle.w < W) paddle.x += 5;
  if (!running) {
    resetBall();
    draw();
    return;
  }
  ball.x += ball.dx;
  ball.y += ball.dy;
  if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.dx = -ball.dx;
  if (ball.y - ball.r < 0) ball.dy = -ball.dy;
  if (ball.y + ball.r > paddle.y && ball.y + ball.r < paddle.y + paddleH &&
      ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
    let hit = (ball.x - paddle.x) / paddle.w;
    let angle = (hit - 0.5) * Math.PI * 0.7;
    let speed = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
    ball.dx = speed * Math.sin(angle);
    ball.dy = -speed * Math.cos(angle);
  }
  if (ball.y + ball.r > H) {
    lives--;
    if (lives > 0) { running = false; resetBall(); }
    else { alert('遊戲結束！得分：' + score); initBricks(); score = 0; lives = 3; resetBall(); }
    scoreEl.textContent = score;
    return;
  }
  for (let b of bricks) {
    if (!b.alive) continue;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w &&
        ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      score += 10;
      scoreEl.textContent = score;
      let overlapX = Math.min(ball.x + ball.r - b.x, b.x + b.w - ball.x + ball.r);
      let overlapY = Math.min(ball.y + ball.r - b.y, b.y + b.h - ball.y + ball.r);
      if (overlapX < overlapY) ball.dx = -ball.dx;
      else ball.dy = -ball.dy;
      if (bricks.every(b => !b.alive)) {
        alert('恭喜過關！得分：' + score);
        initBricks();
      }
      break;
    }
  }
}

function gameLoop() {
  update();
  draw();
  animId = requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') keys.left = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if (e.key === 'r' || e.key === 'R') {
    initBricks(); score = 0; lives = 3;
    scoreEl.textContent = score;
    resetBall();
  }
  if ((e.key === ' ' || e.key === 'Enter') && !running && lives > 0) {
    running = true;
    let speed = Math.sqrt(ball.dx*ball.dx + ball.dy*ball.dy);
    let angle = (Math.random() - 0.5) * 0.8;
    ball.dx = speed * Math.sin(angle) || 2;
    ball.dy = -speed * Math.cos(angle);
  }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft') keys.left = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

initBricks();
resetBall();
gameLoop();
</script>
</body>
</html>
